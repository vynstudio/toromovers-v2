[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NEXT_USE_NETLIFY_EDGE = "true"
  NODE_VERSION = "20"

# Next.js runtime is auto-installed by Netlify; explicit declaration for clarity
[[plugins]]
  package = "@netlify/plugin-nextjs"

[functions]
  node_bundler = "esbuild"

# Force HTTPS and www -> apex redirects handled by Netlify default config; no custom rewrites here.
